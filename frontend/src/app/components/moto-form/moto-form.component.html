<div class="max-w-xl mx-auto mt-10 p-8 bg-white dark:bg-slate-800 shadow-2xl rounded-2xl border border-slate-100 dark:border-slate-700 transition-all hover:shadow-indigo-500/10">
    <!-- Título com Gradiente Premium -->
    <h2 class="text-3xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-600">
        Cadastrar Nova Moto
    </h2>

    <!-- Alertas de Feedback -->
    <div *ngIf="successMessage()" class="mb-4 p-4 text-sm text-green-800 rounded-lg bg-green-50 dark:bg-gray-800 dark:text-green-400 animate-pulse" role="alert">
        {{ successMessage() }}
    </div>
    <div *ngIf="errorMessage()" class="mb-4 p-4 text-sm text-red-800 rounded-lg bg-red-50 dark:bg-gray-800 dark:text-red-400" role="alert">
        {{ errorMessage() }}
    </div>

    <!-- Formulário -->
    <form [formGroup]="motoForm" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <!-- Campo Modelo -->
        <div class="relative group">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1 group-focus-within:text-indigo-600 transition-colors">
                Modelo <span class="text-red-500">*</span>
            </label>
            <input type="text" formControlName="modelo" placeholder="Ex: Fat Boy 114"
                class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder:text-slate-400">
            <p *ngIf="motoForm.get('modelo')?.invalid && motoForm.get('modelo')?.touched" class="mt-1 text-xs text-red-500">
                Modelo é obrigatório (mín. 2 caracteres).
            </p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <!-- Campo Ano -->
            <div class="group">
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
                    Ano <span class="text-red-500">*</span>
                </label>
                <input type="number" formControlName="ano"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>

            <!-- Campo KM -->
            <div class="group">
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
                    KM <span class="text-red-500">*</span>
                </label>
                <input type="number" formControlName="km"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>
        </div>

        <!-- Campo Placa (Opcional) -->
        <div class="group">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Placa</label>
            <input type="text" formControlName="placa" placeholder="ABC-1234"
                class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>

        <!-- Campo VIN (Opcional) -->
        <div class="group">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">VIN (Nº de Chassi)</label>
            <input type="text" formControlName="vin" placeholder="VIN1234567890"
                class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>

        <!-- Botão de Ação -->
        <button type="submit" 
            [disabled]="motoForm.invalid || isSubmitting()"
            class="w-full py-4 mt-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold rounded-xl shadow-lg hover:shadow-indigo-500/30 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2">
            
            <span *ngIf="!isSubmitting()">Finalizar Cadastro</span>
            <span *ngIf="isSubmitting()" class="flex items-center">
                <svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Cadastrando...
            </span>
        </button>
    </form>
</div>
