version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: ironhorse-db
    environment:
      POSTGRES_DB: ironhorse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Application Service (Spring Boot API)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ironhorse-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      IRONHORSE_JWT_SECRET: "${IRONHORSE_JWT_SECRET}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
